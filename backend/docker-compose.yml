version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: sovereigngraph-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sovereigngraph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  graphql-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereigngraph-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sovereigngraph
      GRAPHQL_PORT: 4000
      CHAIN_ENDPOINT: wss://testnet.portaldot.io
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereigngraph-indexer
    command: ["npm", "run", "Indexer:start"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sovereigngraph
      CHAIN_ENDPOINT: wss://testnet.portaldot.io
      ARCHIVE_ENDPOINT: https://testnet.portaldot.io/graphql
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: